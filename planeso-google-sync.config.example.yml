sync:
  - plane:
      baseUrl: https://api.plane.so
      apiKey: my-plane-api-token
      workspace: my-workspace-slug
      projectId: my-project-uuid
    google:
      calendarId: my-calendar-id@group.calendar.google.com
      syncDescriptions: false  # optional: sync Plane.so work item description HTML to the calendar event description
      singleDayPrefix: "🚩 "  # optional: prefix for items with only a due date (no start date)
      multiDayPrefix: "⌛ "   # optional: prefix for items with a start and due date
      stateSuffixes:  # optional: suffix appended to event title based on Plane state group
        backlog: " [Backlog]"
        unstarted: " [Todo]"
        started: " [In Progress]"
        completed: " [Done]"
        cancelled: " [Cancelled]"
      auth:
        clientId: "your-client-id.apps.googleusercontent.com"
        projectId: "your-project-id"
        authUri: "https://accounts.google.com/o/oauth2/auth"
        tokenUri: "https://oauth2.googleapis.com/token"
        authProviderX509CertUrl: "https://www.googleapis.com/oauth2/v1/certs"
        clientSecret: "your-client-secret"
        redirectUris:
          - "http://localhost"
    sync:
      states:
        backlog: true
        unstarted: true
        started: true
        completed: true
        cancelled: false
        triage: false
